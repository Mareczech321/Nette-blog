services:
  project:
    container_name: 'test-project'
    image: thecodingmachine/php:8.3-v4-apache
    volumes:
      - ./../:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/www/
      - APACHE_EXTENSION_HEADERS=1
      - PHP_EXTENSIONS=pdo_mysql mysqli gd intl
    ports:
      - '9000:80'   # Http
#      - '443:443' # Https

  mariadb-development:
    image: mariadb:10.4
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: test_project_db
    ports:
      - "3310:3306"
    volumes:
      - ./volumes/mariadb/:/var/lib/mysql

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: my_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Vypne nutnost hesel (ideální pro lokální vývoj)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # Omezí paměť, aby ti ES nesežral celou RAM
    ports:
      - "9200:9200"